name: Post-deploy verification

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Wait for Cloudflare Pages to deploy the new commit.
      # Strategy: poll for the expected commit SHA in the ETag or a cache-busted
      # resource. Cloudflare typically deploys in 45-90s. We wait unconditionally
      # for 90s first, then poll until version.js returns the current git SHA or
      # we time out at 4 minutes total.
      - name: Wait for Cloudflare deploy
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          URL="https://planner.davegregurke.au"
          SHORT="${EXPECTED_SHA:0:7}"
          echo "Waiting for deploy of $SHORT..."
          echo "Sleeping 90s for initial Cloudflare deploy..."
          sleep 90
          echo "Polling until version.js or site confirms new deploy (max 3 min)..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Site up after additional ${i}x10s"
              break
            fi
            echo "Attempt $i: $STATUS, retrying..."
            sleep 10
          done

      - name: Smoke test (live)
        run: node scripts/smoke-test.js https://planner.davegregurke.au

      - name: Verify security headers (live)
        run: bash scripts/verify-headers.sh https://planner.davegregurke.au
