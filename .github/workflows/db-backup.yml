name: D1 database backup

on:
  schedule:
    # Weekly Sunday 12:00 UTC (22:00 AEST)
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Export D1 snapshot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          FILENAME="backup-$(date +%Y%m%d-%H%M%S).sql"
          wrangler d1 export quick-planner-db --remote --output "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> "$GITHUB_ENV"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: d1-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
