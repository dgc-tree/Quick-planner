version: 2
updates:
  # ── npm packages ────────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Patch and minor version bumps are low risk — group them into one PR
      patch-and-minor:
        update-types:
          - patch
          - minor
      # Major version bumps need individual review
      major:
        update-types:
          - major
    commit-message:
      prefix: deps
      include: scope

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: ci
      include: scope
