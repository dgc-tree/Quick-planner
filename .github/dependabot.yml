version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: ci
      include: scope
